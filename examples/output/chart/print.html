<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2024 年各季度营收</title>
<style>
:root {
  --cd-color-primary: #1a73e8;
  --cd-color-bg: #ffffff;
  --cd-font-heading: 'Inter', sans-serif;
  --cd-font-body: 'Noto Sans SC', 'Noto Sans', sans-serif;
  --cd-spacing-unit: 8px;
  --cd-radius: 4px;
}
body {
  font-family: var(--cd-font-body, 'Noto Sans SC', sans-serif);
  background: var(--cd-color-bg, #faf9f5);
  margin: 2rem;
}
.chart-container {
  max-width: 700px;
  margin: 0 auto;
  padding: 2rem;
  border-radius: var(--cd-radius, 8px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  background: #fff;
}
h1 { font-family: var(--cd-font-heading); color: var(--cd-color-primary, #26251e); font-size: 1.5rem; margin-bottom: 0.25rem; }
.chart-subtitle { color: #8a8880; font-size: 0.9rem; margin-bottom: 1.5rem; }
</style>

<style media="print">
  @page {
    size: A4 landscape;
    margin: 12mm;
  }
  body {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }
  section {
    page-break-after: always;
    break-after: page;
  }
  section:last-child {
    page-break-after: avoid;
    break-after: avoid;
  }
  /* Hide interactive/non-print elements */
  nav, .no-print, button, [role="navigation"] {
    display: none !important;
  }
  /* Prevent orphan headings */
  h1, h2, h3, h4, h5, h6 {
    page-break-after: avoid;
    break-after: avoid;
  }
  /* Keep images with their captions */
  figure, img {
    page-break-inside: avoid;
    break-inside: avoid;
  }
</style>
</head>
