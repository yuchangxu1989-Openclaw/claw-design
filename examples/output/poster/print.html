<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 自主进化 — Poster</title>
  <style>
    :root {
      --cd-color-primary: #1a73e8;
      --cd-color-bg: #ffffff;
      --cd-font-heading: 'Inter', sans-serif;
      --cd-font-body: 'Noto Sans SC', 'Noto Sans', sans-serif;
      --cd-spacing-unit: 8px;
      --cd-radius: 4px;
      --cd-font-heading: 'Inter', sans-serif, 'JetBrains Mono', 'IBM Plex Mono', 'Sarasa Mono SC', 'SFMono-Regular', 'Cascadia Mono', ui-monospace, monospace, 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif;
      --cd-font-body: 'Noto Sans SC', 'Noto Sans', sans-serif, 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif;
      --cd-font-mono: 'JetBrains Mono', 'IBM Plex Mono', monospace, 'JetBrains Mono', 'IBM Plex Mono', 'Sarasa Mono SC', 'SFMono-Regular', 'Cascadia Mono', ui-monospace, monospace;
      --cd-paragraph-gap-tight: 0.48em;
      --cd-paragraph-gap: 0.82em;
      --cd-paragraph-gap-relaxed: 1.12em;
      --cd-reading-measure: 64ch;
      --cd-reading-measure-wide: 78ch;
      --cd-reading-measure-compact: 42ch;
      --cd-cjk-leading-trim: 0.08em;
      --cd-type-h1-size: clamp(2.6rem, 6.8vw, 5.3rem);
      --cd-type-h1-line-height: 0.96;
      --cd-type-h1-letter-spacing: -0.04em;
      --cd-type-h1-weight: 780;
      --cd-type-h1-paragraph-gap: 0.48em;
      --cd-type-h2-size: clamp(2rem, 4.4vw, 3.6rem);
      --cd-type-h2-line-height: 1.02;
      --cd-type-h2-letter-spacing: -0.03em;
      --cd-type-h2-weight: 730;
      --cd-type-h2-paragraph-gap: 0.42em;
      --cd-type-h3-size: clamp(1.6rem, 3vw, 2.5rem);
      --cd-type-h3-line-height: 1.1;
      --cd-type-h3-letter-spacing: -0.02em;
      --cd-type-h3-weight: 700;
      --cd-type-h3-paragraph-gap: 0.34em;
      --cd-type-h4-size: clamp(1.24rem, 2.2vw, 1.82rem);
      --cd-type-h4-line-height: 1.18;
      --cd-type-h4-letter-spacing: -0.01em;
      --cd-type-h4-weight: 650;
      --cd-type-h4-paragraph-gap: 0.28em;
      --cd-type-h5-size: clamp(1rem, 1.7vw, 1.32rem);
      --cd-type-h5-line-height: 1.24;
      --cd-type-h5-letter-spacing: 0em;
      --cd-type-h5-weight: 650;
      --cd-type-h5-paragraph-gap: 0.22em;
      --cd-type-lead-size: clamp(1rem, 1.8vw, 1.18rem);
      --cd-type-lead-line-height: 1.54;
      --cd-type-lead-letter-spacing: -0.008em;
      --cd-type-lead-weight: 500;
      --cd-type-body-size: 0.98rem;
      --cd-type-body-line-height: 1.7;
      --cd-type-body-letter-spacing: 0em;
      --cd-type-body-weight: 420;
      --cd-type-caption-size: 0.86rem;
      --cd-type-caption-line-height: 1.5;
      --cd-type-caption-letter-spacing: 0.02em;
      --cd-type-caption-weight: 450;
      --cd-type-label-size: 0.74rem;
      --cd-type-label-line-height: 1.32;
      --cd-type-label-letter-spacing: 0.16em;
      --cd-type-label-weight: 700;
      --cd-grid-unit: 8px;
      --cd-space-xxs: 0.25rem;
      --cd-space-xs: 0.5rem;
      --cd-space-sm: 0.75rem;
      --cd-space-md: 1rem;
      --cd-space-lg: 1.5rem;
      --cd-space-xl: 2rem;
      --cd-space-2xl: 3rem;
      --cd-space-3xl: 4rem;
      --cd-space-4xl: 5rem;
      --cd-space-5xl: 6rem;
      --cd-page-margin: 16px;
      --cd-page-margin-inline: 16px;
      --cd-section-gap: 32px;
      --cd-section-inset: 24px;
      --cd-card-padding: 16px;
      --cd-card-gap: 12px;
      --cd-cluster-gap: 12px;
      --cd-stack-gap: 16px;
      --cd-button-padding-inline: 20px;
      --cd-button-padding-block: 12px;
      --cd-container-max-width: 1180px;
      --cd-card-radius: clamp(18px, 2vw, 24px);
      --cd-ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --cd-ease-spring: cubic-bezier(0.2, 0.9, 0.22, 1.12);
      --cd-ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --cd-duration-fast: 180ms;
      --cd-duration-normal: 320ms;
      --cd-duration-slow: 520ms;
      --cd-hover-translate-y: -4px;
      --cd-press-scale: 0.98;
      --cd-focus-ring-color: rgba(59,130,246,0.42);
      --cd-focus-ring-size: 3px;
      --poster-width: 1080px;
      --poster-height: 1080px;
      --poster-primary: #00c8ff;
      --poster-secondary: #7b5cff;
      --poster-accent: #00ffa3;
      --poster-background: #0a0e27;
      --poster-surface: #0d1b3e;
      --poster-text: #e8f4ff;
      --poster-muted: rgba(241,245,249,0.78);
      --poster-border: rgba(148,163,184,0.22);
      --poster-shadow: rgba(2,6,23,0.55);
      --poster-highlight: rgba(34,211,238,0.28);
      --poster-bg-image: none;
    }
    * { box-sizing: border-box; }
    
    .cd-heading-1,
    .cd-heading-2,
    .cd-heading-3,
    .cd-heading-4,
    .cd-heading-5,
    .cd-display {
      margin: 0;
      font-family: var(--cd-font-heading);
      text-wrap: balance;
    }
    .cd-heading-1,
    .cd-display {
      font-size: var(--cd-type-h1-size);
      line-height: var(--cd-type-h1-line-height);
      letter-spacing: var(--cd-type-h1-letter-spacing);
      font-weight: var(--cd-type-h1-weight);
    }
    .cd-heading-2 {
      font-size: var(--cd-type-h2-size);
      line-height: var(--cd-type-h2-line-height);
      letter-spacing: var(--cd-type-h2-letter-spacing);
      font-weight: var(--cd-type-h2-weight);
    }
    .cd-heading-3 {
      font-size: var(--cd-type-h3-size);
      line-height: var(--cd-type-h3-line-height);
      letter-spacing: var(--cd-type-h3-letter-spacing);
      font-weight: var(--cd-type-h3-weight);
    }
    .cd-heading-4 {
      font-size: var(--cd-type-h4-size);
      line-height: var(--cd-type-h4-line-height);
      letter-spacing: var(--cd-type-h4-letter-spacing);
      font-weight: var(--cd-type-h4-weight);
    }
    .cd-heading-5 {
      font-size: var(--cd-type-h5-size);
      line-height: var(--cd-type-h5-line-height);
      letter-spacing: var(--cd-type-h5-letter-spacing);
      font-weight: var(--cd-type-h5-weight);
    }
    .cd-lead {
      margin: 0;
      font-family: var(--cd-font-body);
      font-size: var(--cd-type-lead-size);
      line-height: var(--cd-type-lead-line-height);
      letter-spacing: var(--cd-type-lead-letter-spacing);
      font-weight: var(--cd-type-lead-weight);
      max-width: var(--cd-reading-measure);
    }
    .cd-copy {
      font-family: var(--cd-font-body);
      font-size: var(--cd-type-body-size);
      line-height: var(--cd-type-body-line-height);
      letter-spacing: var(--cd-type-body-letter-spacing);
      font-weight: var(--cd-type-body-weight);
      max-width: var(--cd-reading-measure);
    }
    .cd-copy > p {
      margin: 0;
    }
    .cd-copy > p + p {
      margin-top: var(--cd-paragraph-gap);
    }
    .cd-caption {
      margin: 0;
      font-family: var(--cd-font-body);
      font-size: var(--cd-type-caption-size);
      line-height: var(--cd-type-caption-line-height);
      letter-spacing: var(--cd-type-caption-letter-spacing);
      font-weight: var(--cd-type-caption-weight);
    }
    .cd-label {
      margin: 0;
      font-family: var(--cd-font-mono);
      font-size: var(--cd-type-label-size);
      line-height: var(--cd-type-label-line-height);
      letter-spacing: var(--cd-type-label-letter-spacing);
      font-weight: var(--cd-type-label-weight);
      text-transform: uppercase;
    }
    .cd-mono {
      font-family: var(--cd-font-mono);
    }
    .cd-cjk-mix {
      font-family: var(--cd-font-body);
      word-break: normal;
      overflow-wrap: anywhere;
      line-break: auto;
      text-rendering: optimizeLegibility;
      font-variant-east-asian: proportional-width;
    }
    .cd-cjk-mix h1,
    .cd-cjk-mix h2,
    .cd-cjk-mix h3,
    .cd-cjk-mix h4,
    .cd-cjk-mix h5,
    .cd-cjk-mix .cd-heading-1,
    .cd-cjk-mix .cd-heading-2,
    .cd-cjk-mix .cd-heading-3,
    .cd-cjk-mix .cd-heading-4,
    .cd-cjk-mix .cd-heading-5 {
      text-wrap: balance;
      margin-block-end: 0.34em;
    }
    .cd-cjk-mix p,
    .cd-cjk-mix li,
    .cd-cjk-mix blockquote {
      hanging-punctuation: first allow-end last;
    }
  
    
    .cd-stack > * + * { margin-top: var(--cd-stack-gap); }
    .cd-cluster { display: flex; flex-wrap: wrap; gap: var(--cd-cluster-gap); }
    .cd-card-shell {
      padding: var(--cd-card-padding);
      border-radius: var(--cd-card-radius);
      display: grid;
      gap: var(--cd-card-gap);
    }
    .cd-page-shell {
      width: min(100%, var(--cd-container-max-width));
      margin: 0 auto;
      padding-inline: var(--cd-page-margin-inline);
    }
    .cd-section-shell {
      padding-block: var(--cd-section-gap);
    }
    @media (min-width: 768px) {
      :root {
        --cd-page-margin: 24px;
        --cd-page-margin-inline: 24px;
        --cd-section-gap: 48px;
        --cd-section-inset: 32px;
        --cd-card-padding: 24px;
        --cd-card-gap: 16px;
        --cd-cluster-gap: 16px;
        --cd-stack-gap: 24px;
        --cd-button-padding-inline: 24px;
        --cd-button-padding-block: 14px;
      }
    }
    @media (min-width: 1200px) {
      :root {
        --cd-page-margin: 40px;
        --cd-page-margin-inline: 40px;
        --cd-section-gap: 64px;
        --cd-section-inset: 48px;
        --cd-card-padding: 24px;
        --cd-card-gap: 20px;
        --cd-cluster-gap: 24px;
        --cd-stack-gap: 32px;
        --cd-button-padding-inline: 28px;
        --cd-button-padding-block: 14px;
      }
    }
  
    
    @keyframes cd-fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes cd-slide-up {
  from { opacity: 0; transform: translate3d(0, 24px, 0); }
  to { opacity: 1; transform: translate3d(0, 0, 0); }
}

@keyframes cd-scale-in {
  from { opacity: 0; transform: scale3d(0.96, 0.96, 1); }
  to { opacity: 1; transform: scale3d(1, 1, 1); }
}

@keyframes cd-focus-pulse {
  from { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
  55% { box-shadow: 0 0 0 6px rgba(59,130,246,0.22); }
  to { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
}

    .cd-animate-fade-in {
      animation: cd-fade-in 420ms var(--cd-ease-out) both;
    }
    .cd-animate-slide-up {
      animation: cd-slide-up 520ms var(--cd-ease-spring) both;
    }
    .cd-animate-scale-in {
      animation: cd-scale-in 460ms var(--cd-ease-spring) both;
      transform-origin: center;
    }
    .cd-hover-lift {
      transition:
        transform 220ms var(--cd-ease-out),
        box-shadow 220ms var(--cd-ease-out),
        border-color 220ms var(--cd-ease-out);
    }
    .cd-hover-lift:hover {
      transform: translateY(var(--cd-hover-translate-y));
    }
    .cd-press-scale {
      transition: transform 140ms var(--cd-ease-bounce);
    }
    .cd-press-scale:active {
      transform: scale(var(--cd-press-scale));
    }
    .cd-focus-ring {
      outline: none;
      transition:
        box-shadow 180ms var(--cd-ease-out),
        border-color 180ms var(--cd-ease-out);
    }
    .cd-focus-ring:focus-visible {
      box-shadow: 0 0 0 var(--cd-focus-ring-size) var(--cd-focus-ring-color);
      animation: cd-focus-pulse 420ms var(--cd-ease-out) both;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--cd-page-margin);
      background: radial-gradient(circle at top, rgba(255,255,255,0.12), transparent 36%), #0b1020;
      font-family: var(--cd-font-body, 'Noto Sans SC', 'Noto Sans', sans-serif);
      color: var(--poster-text);
    }
    .poster-frame {
      width: min(100%, var(--poster-width));
      display: flex;
      justify-content: center;
      padding-inline: var(--cd-page-margin-inline);
    }
    .poster {
      position: relative;
      width: var(--poster-width);
      height: var(--poster-height);
      overflow: hidden;
      border-radius: clamp(24px, 3vw, 36px);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 42%),
        linear-gradient(160deg, var(--poster-background) 0%, var(--poster-surface) 100%);
      color: var(--poster-text);
      box-shadow: 0 32px 80px var(--poster-shadow);
      isolation: isolate;
      border: 1px solid var(--poster-border);
      transition: transform var(--cd-duration-normal) var(--cd-ease-out), box-shadow var(--cd-duration-normal) var(--cd-ease-out);
    }
    .poster::before,
    .poster::after {
      content: '';
      position: absolute;
      inset: auto;
      pointer-events: none;
      z-index: 0;
    }
    .poster::before {
      width: 58%;
      aspect-ratio: 1;
      top: -18%;
      right: -16%;
      border-radius: 999px;
      background: radial-gradient(circle, var(--poster-highlight) 0%, transparent 72%);
      filter: blur(8px);
      opacity: 0.88;
    }
    .poster::after {
      width: 42%;
      aspect-ratio: 1;
      bottom: -12%;
      left: -10%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
      opacity: 0.8;
    }
    .poster__image {
      position: absolute;
      inset: 0;
      background-image: var(--poster-bg-image);
      background-size: cover;
      background-position: center;
      opacity: 0.16;
      mix-blend-mode: screen;
      z-index: 0;
    }
    .poster__grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.16;
      background-image:
        linear-gradient(var(--poster-border) 1px, transparent 1px),
        linear-gradient(90deg, var(--poster-border) 1px, transparent 1px);
      background-size: clamp(24px, 5vw, 42px) clamp(24px, 5vw, 42px);
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.4), transparent 88%);
    }
    .poster__content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: var(--cd-section-inset);
      gap: clamp(18px, 2.5vw, 30px);
      animation: cd-fade-in var(--cd-duration-slow) var(--cd-ease-out) both;
    }
    .poster__top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }
    .poster__badge,
    .poster__chip,
    .poster__stat {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid var(--poster-border);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
    }
    .poster__badge {
      padding: 10px 16px;
      letter-spacing: 0.24em;
      font-size: 0.74rem;
      font-weight: 800;
    }
    .poster__chip {
      padding: 8px 14px;
      font-size: 0.76rem;
      text-transform: uppercase;
      color: var(--poster-muted);
    }
    .poster__hero {
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 2vw, 18px);
      max-width: 78%;
      animation: cd-slide-up var(--cd-duration-slow) var(--cd-ease-spring) both;
    }
    .poster__title {
      margin: 0;
      font-family: var(--cd-font-heading, 'Inter', sans-serif);
      font-size: var(--cd-type-h1-size);
      line-height: var(--cd-type-h1-line-height);
      letter-spacing: var(--cd-type-h1-letter-spacing);
      font-weight: var(--cd-type-h1-weight);
      text-wrap: balance;
    }
    .poster__subtitle {
      margin: 0;
      color: var(--poster-muted);
      font-size: var(--cd-type-lead-size);
      line-height: var(--cd-type-lead-line-height);
      letter-spacing: var(--cd-type-lead-letter-spacing);
      max-width: var(--cd-reading-measure);
    }
    .poster__main {
      margin-top: auto;
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(220px, 0.8fr);
      gap: clamp(18px, 2.6vw, 28px);
      align-items: end;
    }
    .poster__story {
      display: flex;
      flex-direction: column;
      gap: var(--cd-paragraph-gap-tight);
    }
    .poster__story p {
      margin: 0;
      color: var(--poster-text);
      font-size: var(--cd-type-body-size);
      line-height: var(--cd-type-body-line-height);
      letter-spacing: var(--cd-type-body-letter-spacing);
    }
    .poster__panel {
      padding: var(--cd-card-padding);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.06));
      border: 1px solid var(--poster-border);
      display: flex;
      flex-direction: column;
      gap: var(--cd-card-gap);
      min-height: 180px;
      animation: cd-scale-in var(--cd-duration-slow) var(--cd-ease-spring) both;
      transition: transform var(--cd-duration-fast) var(--cd-ease-out), box-shadow var(--cd-duration-fast) var(--cd-ease-out), border-color var(--cd-duration-fast) var(--cd-ease-out);
    }
    .poster__panel:hover {
      transform: translateY(var(--cd-hover-translate-y));
    }
    .poster__panel-title {
      font-family: var(--cd-font-mono, 'JetBrains Mono', monospace);
      font-size: var(--cd-type-label-size);
      line-height: var(--cd-type-label-line-height);
      text-transform: uppercase;
      letter-spacing: var(--cd-type-label-letter-spacing);
      color: var(--poster-muted);
    }
    .poster__panel-copy {
      font-size: var(--cd-type-body-size);
      line-height: var(--cd-type-body-line-height);
      color: var(--poster-text);
    }
    .poster__stats {
      display: flex;
      flex-wrap: wrap;
      gap: var(--cd-cluster-gap);
      margin-top: auto;
    }
    .poster__stat {
      padding: 10px 14px;
      font-family: var(--cd-font-mono, 'JetBrains Mono', monospace);
      font-size: var(--cd-type-caption-size);
      line-height: var(--cd-type-caption-line-height);
      color: var(--poster-text);
    }
    .poster__footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
    }
    .poster__footer-copy {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 70%;
    }
    .poster__eyebrow {
      text-transform: uppercase;
      letter-spacing: var(--cd-type-label-letter-spacing);
      font-family: var(--cd-font-mono, 'JetBrains Mono', monospace);
      font-size: var(--cd-type-label-size);
      color: var(--poster-muted);
    }
    .poster__cta {
      padding: var(--cd-button-padding-block) var(--cd-button-padding-inline);
      border-radius: 18px;
      background: linear-gradient(135deg, var(--poster-primary) 0%, var(--poster-accent) 100%);
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.02em;
      min-width: 180px;
      text-align: center;
      box-shadow: 0 18px 32px rgba(0,0,0,0.18);
      transition: transform var(--cd-duration-fast) var(--cd-ease-bounce), box-shadow var(--cd-duration-fast) var(--cd-ease-out);
    }
    .poster__cta:hover {
      transform: translateY(var(--cd-hover-translate-y));
    }
    .poster__cta:active {
      transform: scale(var(--cd-press-scale));
    }
    .poster--modern .poster__title {
      text-transform: uppercase;
      max-width: 10ch;
    }
    .poster--modern .poster__content {
      background: linear-gradient(180deg, rgba(7,12,25,0.08), transparent 30%);
    }
    .poster--modern .poster__panel {
      transform: translateY(10px);
    }
    .poster--classic {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.1)),
        linear-gradient(160deg, var(--poster-background) 0%, var(--poster-surface) 100%);
    }
    .poster--classic .poster__content {
      border: 1px solid rgba(255,255,255,0.08);
      margin: clamp(14px, 2vw, 20px);
      height: calc(100% - clamp(28px, 4vw, 40px));
      padding: clamp(24px, 4vw, 44px);
    }
    .poster--classic .poster__title {
      letter-spacing: -0.02em;
      font-size: clamp(2.4rem, 5.4vw, 4.6rem);
      max-width: 12ch;
